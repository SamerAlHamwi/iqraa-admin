<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>تسجيل الدخول — IQRAA</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">

    <style>
        .theme-toggle-auth {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="theme-toggle-auth">
    <div class="nav-ico-btn" id="darkBtn" onclick="toggleDark()" style="background:var(--surface); border-color:var(--border); color:var(--ink2);">🌙</div>
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <a href="#" class="auth-logo">
            <div class="logo-mark">ا</div>
            <div style="text-align: center;">
                <div class="logo-name" style="font-family:'Tajawal';font-weight:900;"><em>اق</em>رأ</div>
                <div class="logo-en">IQRAA PLATFORM</div>
            </div>
        </a>

        <div class="auth-hd">
            <h1>لوحة الإدارة</h1>
            <p>سجل دخولك للمتابعة إلى المنصة</p>
        </div>

        <form class="auth-form" onsubmit="handleLogin(event)">
            <div class="auth-field">
                <label for="loginUser">اسم المستخدم أو البريد الإلكتروني</label>
                <div class="auth-input-wrap">
                    <span class="auth-input-ico">👤</span>
                    <input type="text" class="finp" id="loginUser" placeholder="admin" required>
                </div>
            </div>

            <div class="auth-field">
                <label for="loginPass">كلمة المرور</label>
                <div class="auth-input-wrap">
                    <span class="auth-input-ico">🔒</span>
                    <input type="password" class="finp" id="loginPass" placeholder="••••••••" required>
                </div>
            </div>

            <div class="auth-extra">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" style="width:16px;height:16px;accent-color:var(--p500)">
                    تذكرني
                </label>
                <a href="#" class="auth-forgot">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">دخول النظام</button>
        </form>

        <div class="auth-footer">
            ليس لديك حساب؟ <a href="#">تواصل مع الدعم الفني</a>
        </div>
    </div>
</div>

<div id="toastBox"></div>

<!-- Shared UI Logic for Toasts/Theme -->
<script src="js/ui.js"></script>
<!-- Auth Logic -->
<script src="js/auth.js"></script>

</body>
</html>
